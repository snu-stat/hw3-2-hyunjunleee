name: Quarto Publish (R & Custom Packages)
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: r-reticulate
          channels: conda-forge,defaults

      - name: Install Python dependencies via Conda
        run: |
          conda install -n r-reticulate -y \
            python=3.12 \
            numpy \
            pandas \
            polars \
            statsmodels \
            patsy \
            matplotlib \
            scipy \
            plotnine \
            -c conda-forge

          conda run -n r-reticulate pip install \
            pylahman \
            session-info
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true 

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c("reticulate", "knitr", "rmarkdown", "remotes"))
          install.packages(c(
            "tidyverse", "lubridate", "Lahman", "mosaicData", 
            "babynames", "NHANES", "patchwork", "mdsr", "boot"
          ))
          install.packages(c("MASS", "Lahman"))
        shell: Rscript {0}

      - name: Render Quarto
        run: |
          export CONDA_ENV=$(conda info --base)/envs/r-reticulate
          export RETICULATE_PYTHON=$CONDA_ENV/bin/python
          export LD_PRELOAD=$CONDA_ENV/lib/libexpat.so.1
          export MPLBACKEND=Agg
          quarto render
        shell: bash -l {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

# ... (기존 Quarto Render 단계 이후)

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-r-env:latest

